[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[functions."daily-schedule"]
  schedule = "0 3 * * *"

# Run send-reminders every 15 minutes so 6/12/24-hour reminders fire
# within ~15 min of the chosen window before each appointment.
[functions."send-reminders"]
  schedule = "*/15 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
