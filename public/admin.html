<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimi's Studio - Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FDF6EC;
            --terracotta: #C47D5A;
            --deep-brown: #5C3D2E;
            --soft-olive: #8B9E7E;
            --gold: #C9A96E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--cream);
            color: var(--deep-brown);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        header {
            background-color: var(--deep-brown);
            color: var(--cream);
            padding: 20px 0;
            border-bottom: 4px solid var(--gold);
            margin-bottom: 30px;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--cream);
        }

        .header-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .back-link {
            color: var(--gold);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--cream);
        }

        .logout-btn {
            background-color: var(--terracotta);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        .logout-btn:hover {
            background-color: #b36a4a;
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--deep-brown) 0%, var(--soft-olive) 100%);
            padding: 20px;
        }

        .login-card {
            background-color: var(--cream);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--deep-brown);
            text-align: center;
        }

        .login-card p {
            text-align: center;
            color: var(--soft-olive);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--deep-brown);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--gold);
            border-radius: 4px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--terracotta);
            background-color: rgba(196, 125, 90, 0.05);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--terracotta);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-family: 'Lato', sans-serif;
        }

        .login-btn:hover {
            background-color: #b36a4a;
        }

        .login-btn:disabled {
            background-color: var(--soft-olive);
            cursor: not-allowed;
        }

        .login-error {
            color: #d9534f;
            font-size: 14px;
            margin-top: 15px;
            padding: 10px;
            background-color: rgba(217, 83, 79, 0.1);
            border-radius: 4px;
            display: none;
        }

        /* DASHBOARD */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--gold);
            flex-wrap: wrap;
        }

        .tab-btn {
            background-color: transparent;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-family: 'Lato', sans-serif;
            color: var(--soft-olive);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tab-btn:hover {
            color: var(--terracotta);
        }

        .tab-btn.active {
            color: var(--terracotta);
            border-bottom-color: var(--terracotta);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* SECTION STYLES */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--deep-brown);
        }

        .search-filters {
            background-color: rgba(196, 125, 90, 0.1);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: 600;
            color: var(--deep-brown);
            margin-bottom: 5px;
            font-size: 13px;
        }

        .filter-group input,
        .filter-group select {
            padding: 8px;
            border: 1px solid var(--gold);
            border-radius: 4px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
        }

        /* APPOINTMENT TABLE */
        .appointments-table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .appointments-table thead {
            background-color: var(--deep-brown);
            color: var(--cream);
        }

        .appointments-table th {
            padding: 15px;
            text-align: left;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
        }

        .appointments-table th:hover {
            background-color: var(--soft-olive);
        }

        .appointments-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .appointments-table tbody tr:hover {
            background-color: rgba(196, 125, 90, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-scheduled {
            background-color: rgba(139, 158, 126, 0.2);
            color: var(--soft-olive);
        }

        .status-completed {
            background-color: rgba(139, 158, 126, 0.3);
            color: #6b7a5d;
        }

        .status-cancelled {
            background-color: rgba(217, 83, 79, 0.2);
            color: #d9534f;
        }

        .status-noshow {
            background-color: rgba(201, 169, 110, 0.2);
            color: var(--gold);
        }

        .status-blocked {
            background-color: rgba(92, 61, 46, 0.2);
            color: var(--deep-brown);
        }

        /* ACTION BUTTONS */
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background-color: var(--terracotta);
            color: white;
        }

        .btn-primary:hover {
            background-color: #b36a4a;
        }

        .btn-secondary {
            background-color: var(--soft-olive);
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7a8a6c;
        }

        .btn-danger {
            background-color: #d9534f;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c9302c;
        }

        .btn-warning {
            background-color: var(--gold);
            color: var(--deep-brown);
        }

        .btn-warning:hover {
            background-color: #b8945f;
        }

        .btn-small {
            padding: 6px 10px;
            font-size: 11px;
        }

        /* FORMS */
        .form-section {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-section .form-group label {
            font-weight: 600;
            color: var(--deep-brown);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-section input,
        .form-section select,
        .form-section textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--gold);
            border-radius: 4px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
        }

        .form-section textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-section input:focus,
        .form-section select:focus,
        .form-section textarea:focus {
            outline: none;
            border-color: var(--terracotta);
            background-color: rgba(196, 125, 90, 0.05);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--cream);
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--deep-brown);
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .close-modal {
            background-color: transparent;
            color: var(--soft-olive);
            border: none;
            cursor: pointer;
            float: right;
            font-size: 24px;
            line-height: 1;
            padding: 0;
        }

        .close-modal:hover {
            color: var(--terracotta);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--soft-olive);
        }

        .empty-state p {
            font-size: 16px;
        }

        /* CLIENT CARD */
        .client-card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 4px solid var(--terracotta);
        }

        .client-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--deep-brown);
        }

        .client-info {
            font-size: 13px;
            color: var(--soft-olive);
            margin-bottom: 10px;
            line-height: 1.8;
        }

        /* FOOTER */
        footer {
            background-color: var(--deep-brown);
            color: var(--cream);
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 4px solid var(--gold);
            font-size: 13px;
        }

        footer a {
            color: var(--gold);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* LOADING & MESSAGES */
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--soft-olive);
        }

        .message {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background-color: rgba(139, 158, 126, 0.2);
            color: #6b7a5d;
            border-left: 4px solid var(--soft-olive);
            display: block;
        }

        .message.error {
            background-color: rgba(217, 83, 79, 0.2);
            color: #d9534f;
            border-left: 4px solid #d9534f;
            display: block;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .section-title {
                font-size: 20px;
            }

            .header-right {
                flex-direction: column;
                gap: 10px;
            }

            .appointments-table {
                font-size: 12px;
            }

            .appointments-table th,
            .appointments-table td {
                padding: 10px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .search-filters {
                grid-template-columns: 1fr;
            }

            .modal-content {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h2>Mimi's Studio</h2>
            <p>Admin Dashboard</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
                <div class="login-error" id="loginError"></div>
            </form>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <header>
            <div class="container">
                <h1>Mimi's Studio</h1>
                <div class="header-right">
                    <a href="/" class="back-link">← Back to Booking</a>
                    <button class="logout-btn" id="logoutBtn">Logout</button>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="message" id="successMessage"></div>
            <div class="message error" id="errorMessage"></div>

            <!-- TABS -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="today">Today's Schedule</button>
                <button class="tab-btn" data-tab="upcoming">Upcoming Appointments</button>
                <button class="tab-btn" data-tab="history">Appointment History</button>
                <button class="tab-btn" data-tab="block">Block Times</button>
                <button class="tab-btn" data-tab="clients">Client List</button>
            </div>

            <!-- TODAY'S SCHEDULE -->
            <div class="tab-content active" id="today">
                <h2 class="section-title">Today's Schedule</h2>
                <div id="todayContent"></div>
            </div>

            <!-- UPCOMING APPOINTMENTS -->
            <div class="tab-content" id="upcoming">
                <h2 class="section-title">Upcoming Appointments</h2>
                <div class="search-filters">
                    <div class="filter-group">
                        <label for="upcomingSearch">Search by Client Name</label>
                        <input type="text" id="upcomingSearch" placeholder="Enter client name...">
                    </div>
                    <div class="filter-group">
                        <label for="upcomingSort">Sort By</label>
                        <select id="upcomingSort">
                            <option value="date-asc">Date (Earliest First)</option>
                            <option value="date-desc">Date (Latest First)</option>
                            <option value="name">Client Name (A-Z)</option>
                        </select>
                    </div>
                </div>
                <div id="upcomingContent"></div>
            </div>

            <!-- APPOINTMENT HISTORY -->
            <div class="tab-content" id="history">
                <h2 class="section-title">Appointment History</h2>
                <div class="search-filters">
                    <div class="filter-group">
                        <label for="historySearch">Search by Client Name</label>
                        <input type="text" id="historySearch" placeholder="Enter client name...">
                    </div>
                    <div class="filter-group">
                        <label for="historyStartDate">From Date</label>
                        <input type="date" id="historyStartDate">
                    </div>
                    <div class="filter-group">
                        <label for="historyEndDate">To Date</label>
                        <input type="date" id="historyEndDate">
                    </div>
                    <div class="filter-group">
                        <label for="historyStatus">Status</label>
                        <select id="historyStatus">
                            <option value="">All Statuses</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                            <option value="noshow">No-Show</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="historySort">Sort By</label>
                        <select id="historySort">
                            <option value="date-desc">Date (Newest First)</option>
                            <option value="date-asc">Date (Oldest First)</option>
                            <option value="name">Client Name (A-Z)</option>
                        </select>
                    </div>
                </div>
                <div id="historyContent"></div>
            </div>

            <!-- BLOCK TIMES -->
            <div class="tab-content" id="block">
                <h2 class="section-title">Block Times</h2>
                <div class="form-section">
                    <h3 style="font-family: 'Playfair Display', serif; margin-bottom: 20px; color: var(--deep-brown);">Block a Date or Time Range</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="blockDate">Date</label>
                            <input type="date" id="blockDate" required>
                        </div>
                        <div class="form-group">
                            <label for="blockStartTime">Start Time</label>
                            <input type="time" id="blockStartTime" value="09:00">
                        </div>
                        <div class="form-group">
                            <label for="blockEndTime">End Time</label>
                            <input type="time" id="blockEndTime" value="17:00">
                        </div>
                        <div class="form-group">
                            <label for="blockReason">Reason (optional)</label>
                            <input type="text" id="blockReason" placeholder="e.g., Closed for holiday, Training day">
                        </div>
                    </div>
                    <button class="btn btn-primary" id="blockSubmitBtn">Block Time</button>
                </div>

                <h3 style="font-family: 'Playfair Display', serif; margin-top: 30px; margin-bottom: 20px; color: var(--deep-brown);">Blocked Times</h3>
                <div id="blockedTimesContent"></div>
            </div>

            <!-- CLIENT LIST -->
            <div class="tab-content" id="clients">
                <h2 class="section-title">Client List</h2>
                <div class="search-filters">
                    <div class="filter-group">
                        <label for="clientSearch">Search by Client Name</label>
                        <input type="text" id="clientSearch" placeholder="Enter client name...">
                    </div>
                    <div class="filter-group">
                        <label for="clientSort">Sort By</label>
                        <select id="clientSort">
                            <option value="name">Name (A-Z)</option>
                            <option value="appointments-desc">Most Appointments</option>
                            <option value="appointments-asc">Fewest Appointments</option>
                        </select>
                    </div>
                </div>
                <div id="clientsContent"></div>
            </div>
        </div>
    </div>

    <!-- MODAL FOR EDITING APPOINTMENTS -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeEditModal()">&times;</button>
            <div class="modal-header">Edit Appointment</div>
            <div id="editModalContent"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditedAppointment()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- MODAL FOR ADDING NOTES -->
    <div class="modal" id="notesModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeNotesModal()">&times;</button>
            <div class="modal-header">Add Admin Notes</div>
            <div class="form-group">
                <label for="adminNotes">Admin Notes</label>
                <textarea id="adminNotes" placeholder="Enter your notes here..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeNotesModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveAdminNotes()">Save Notes</button>
            </div>
        </div>
    </div>

    <footer>
        <p><strong>Mimi's Studio</strong></p>
        <p>Phone: <a href="tel:+17072924914">(707) 292-4914</a> | Email: <a href="mailto:mimisstudio@gmail.com">mimisstudio@gmail.com</a></p>
    </footer>

    <script>
        // STATE
        let authToken = null;
        let allAppointments = [];
        let allClients = [];
        let currentEditingAppointmentId = null;
        let currentEditingNotesAppointmentId = null;

        // INITIALIZATION
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            checkAuthState();
        });

        function setupEventListeners() {
            // Login
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('logoutBtn').addEventListener('click', handleLogout);

            // Tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });

            // Search and filters
            document.getElementById('upcomingSearch').addEventListener('input', filterUpcomingAppointments);
            document.getElementById('upcomingSort').addEventListener('change', filterUpcomingAppointments);
            document.getElementById('historySearch').addEventListener('input', filterHistoryAppointments);
            document.getElementById('historyStartDate').addEventListener('change', filterHistoryAppointments);
            document.getElementById('historyEndDate').addEventListener('change', filterHistoryAppointments);
            document.getElementById('historyStatus').addEventListener('change', filterHistoryAppointments);
            document.getElementById('historySort').addEventListener('change', filterHistoryAppointments);
            document.getElementById('clientSearch').addEventListener('input', filterClients);
            document.getElementById('clientSort').addEventListener('change', filterClients);

            // Block time
            document.getElementById('blockSubmitBtn').addEventListener('click', handleBlockTime);

            // Set today's date as default for block date
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('blockDate').value = today;
        }

        // AUTH
        function checkAuthState() {
            if (authToken) {
                showDashboard();
                loadAllData();
            } else {
                showLoginScreen();
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');

            loginBtn.disabled = true;
            loginError.style.display = 'none';

            try {
                const response = await fetch('/.netlify/functions/admin-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok || !data.token) {
                    throw new Error(data.message || 'Login failed');
                }

                authToken = data.token;
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                showDashboard();
                loadAllData();
            } catch (error) {
                loginError.textContent = error.message;
                loginError.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
            }
        }

        function handleLogout() {
            authToken = null;
            allAppointments = [];
            allClients = [];
            showLoginScreen();
        }

        // UI DISPLAY
        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(tabName).classList.add('active');

            if (tabName === 'today') {
                renderTodaySchedule();
            } else if (tabName === 'upcoming') {
                filterUpcomingAppointments();
            } else if (tabName === 'history') {
                filterHistoryAppointments();
            } else if (tabName === 'block') {
                renderBlockedTimes();
            } else if (tabName === 'clients') {
                filterClients();
            }
        }

        // API CALLS
        async function apiCall(action, params = {}) {
            try {
                const response = await fetch('/.netlify/functions/admin-api', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ action, ...params })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'API call failed');
                }

                return data;
            } catch (error) {
                showError(error.message);
                throw error;
            }
        }

        async function loadAllData() {
            try {
                const appointmentsData = await apiCall('getAppointments');
                const clientsData = await apiCall('getClients');

                allAppointments = appointmentsData.appointments || [];
                allClients = clientsData.clients || [];

                renderTodaySchedule();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // RENDER FUNCTIONS
        function renderTodaySchedule() {
            const today = new Date().toISOString().split('T')[0];
            const todayAppts = allAppointments.filter(apt => {
                const aptDate = apt.date.split('T')[0];
                return aptDate === today && apt.status !== 'blocked';
            }).sort((a, b) => a.time.localeCompare(b.time));

            const content = document.getElementById('todayContent');

            if (todayAppts.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No appointments scheduled for today.</p></div>';
                return;
            }

            content.innerHTML = todayAppts.map(apt => `
                <div class="form-section">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
                        <div>
                            <strong style="color: var(--deep-brown);">Client:</strong> ${apt.clientName}<br>
                            <strong style="color: var(--deep-brown);">Time:</strong> ${formatTime(apt.time)}<br>
                            <strong style="color: var(--deep-brown);">Service:</strong> ${apt.service}<br>
                            <strong style="color: var(--deep-brown);">Phone:</strong> ${apt.clientPhone || 'N/A'}
                        </div>
                        <div>
                            <strong style="color: var(--deep-brown);">Notes:</strong> ${apt.clientNotes || 'No notes'}<br>
                            <strong style="color: var(--deep-brown);">Admin Notes:</strong> ${apt.adminNotes || 'No admin notes'}
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-primary btn-small" onclick="openEditModal('${apt.id}')">Reschedule</button>
                        <button class="btn btn-secondary btn-small" onclick="markCompleted('${apt.id}')">Mark Completed</button>
                        <button class="btn btn-warning btn-small" onclick="markNoShow('${apt.id}')">Mark No-Show</button>
                        <button class="btn btn-secondary btn-small" onclick="openNotesModal('${apt.id}')">Add Notes</button>
                        <button class="btn btn-danger btn-small" onclick="cancelAppointment('${apt.id}')">Cancel</button>
                    </div>
                </div>
            `).join('');
        }

        function renderUpcomingAppointments(appts) {
            const content = document.getElementById('upcomingContent');

            if (appts.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No upcoming appointments.</p></div>';
                return;
            }

            let html = '<table class="appointments-table"><thead><tr><th>Date & Time</th><th>Client</th><th>Service</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
            html += appts.map(apt => `
                <tr>
                    <td>${formatDateTime(apt.date, apt.time)}</td>
                    <td>${apt.clientName}</td>
                    <td>${apt.service}</td>
                    <td>${apt.clientPhone || 'N/A'}</td>
                    <td><span class="status-badge status-scheduled">Scheduled</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-primary btn-small" onclick="openEditModal('${apt.id}')">Reschedule</button>
                            <button class="btn btn-secondary btn-small" onclick="openNotesModal('${apt.id}')">Notes</button>
                            <button class="btn btn-danger btn-small" onclick="cancelAppointment('${apt.id}')">Cancel</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            html += '</tbody></table>';
            content.innerHTML = html;
        }

        function renderHistoryAppointments(appts) {
            const content = document.getElementById('historyContent');

            if (appts.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No appointments found.</p></div>';
                return;
            }

            let html = '<table class="appointments-table"><thead><tr><th>Date & Time</th><th>Client</th><th>Service</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
            html += appts.map(apt => {
                const statusClass = `status-${apt.status}`;
                return `
                    <tr>
                        <td>${formatDateTime(apt.date, apt.time)}</td>
                        <td>${apt.clientName}</td>
                        <td>${apt.service}</td>
                        <td><span class="status-badge ${statusClass}">${apt.status}</span></td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn btn-secondary btn-small" onclick="openNotesModal('${apt.id}')">Notes</button>
                                <button class="btn btn-danger btn-small" onclick="deleteAppointment('${apt.id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            html += '</tbody></table>';
            content.innerHTML = html;
        }

        function renderBlockedTimes() {
            const blockedAppts = allAppointments.filter(apt => apt.status === 'blocked')
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            const content = document.getElementById('blockedTimesContent');

            if (blockedAppts.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No blocked times.</p></div>';
                return;
            }

            content.innerHTML = blockedAppts.map(apt => `
                <div class="form-section">
                    <strong style="color: var(--deep-brown);">Date:</strong> ${formatDate(apt.date)} |
                    <strong style="color: var(--deep-brown);">Time:</strong> ${formatTime(apt.time)} - ${formatTime(apt.endTime || '17:00')} |
                    <strong style="color: var(--deep-brown);">Reason:</strong> ${apt.reason || 'N/A'}
                    <div style="margin-top: 10px;">
                        <button class="btn btn-danger btn-small" onclick="deleteAppointment('${apt.id}')">Remove Block</button>
                    </div>
                </div>
            `).join('');
        }

        function renderClients(clients) {
            const content = document.getElementById('clientsContent');

            if (clients.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No clients found.</p></div>';
                return;
            }

            content.innerHTML = clients.map(client => `
                <div class="client-card">
                    <h3>${client.name}</h3>
                    <div class="client-info">
                        <div><strong>Phone:</strong> ${client.phone || 'N/A'}</div>
                        <div><strong>Email:</strong> ${client.email || 'N/A'}</div>
                        <div><strong>Total Appointments:</strong> ${client.appointmentCount || 0}</div>
                        <div><strong>Last Appointment:</strong> ${client.lastAppointmentDate ? formatDate(client.lastAppointmentDate) : 'N/A'}</div>
                    </div>
                </div>
            `).join('');
        }

        // FILTER FUNCTIONS
        function filterUpcomingAppointments() {
            const now = new Date();
            const searchTerm = document.getElementById('upcomingSearch').value.toLowerCase();
            const sortBy = document.getElementById('upcomingSort').value;

            let filtered = allAppointments.filter(apt => {
                const aptDate = new Date(apt.date + 'T' + apt.time);
                return aptDate > now &&
                       apt.status !== 'cancelled' &&
                       apt.status !== 'blocked' &&
                       apt.clientName.toLowerCase().includes(searchTerm);
            });

            if (sortBy === 'date-asc') {
                filtered.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
            } else if (sortBy === 'date-desc') {
                filtered.sort((a, b) => new Date(b.date + 'T' + b.time) - new Date(a.date + 'T' + a.time));
            } else if (sortBy === 'name') {
                filtered.sort((a, b) => a.clientName.localeCompare(b.clientName));
            }

            renderUpcomingAppointments(filtered);
        }

        function filterHistoryAppointments() {
            const now = new Date();
            const searchTerm = document.getElementById('historySearch').value.toLowerCase();
            const startDate = document.getElementById('historyStartDate').value;
            const endDate = document.getElementById('historyEndDate').value;
            const statusFilter = document.getElementById('historyStatus').value;
            const sortBy = document.getElementById('historySort').value;

            let filtered = allAppointments.filter(apt => {
                const aptDate = new Date(apt.date + 'T' + apt.time);
                const isPast = aptDate <= now;
                const nameMatches = apt.clientName.toLowerCase().includes(searchTerm);
                const statusMatches = !statusFilter || apt.status === statusFilter;

                let dateMatches = true;
                if (startDate) {
                    dateMatches = dateMatches && new Date(apt.date) >= new Date(startDate);
                }
                if (endDate) {
                    dateMatches = dateMatches && new Date(apt.date) <= new Date(endDate);
                }

                return isPast && nameMatches && statusMatches && dateMatches && apt.status !== 'blocked';
            });

            if (sortBy === 'date-desc') {
                filtered.sort((a, b) => new Date(b.date + 'T' + b.time) - new Date(a.date + 'T' + a.time));
            } else if (sortBy === 'date-asc') {
                filtered.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
            } else if (sortBy === 'name') {
                filtered.sort((a, b) => a.clientName.localeCompare(b.clientName));
            }

            renderHistoryAppointments(filtered);
        }

        function filterClients() {
            const searchTerm = document.getElementById('clientSearch').value.toLowerCase();
            const sortBy = document.getElementById('clientSort').value;

            let filtered = allClients.filter(client =>
                client.name.toLowerCase().includes(searchTerm)
            );

            if (sortBy === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === 'appointments-desc') {
                filtered.sort((a, b) => (b.appointmentCount || 0) - (a.appointmentCount || 0));
            } else if (sortBy === 'appointments-asc') {
                filtered.sort((a, b) => (a.appointmentCount || 0) - (b.appointmentCount || 0));
            }

            renderClients(filtered);
        }

        // ACTION FUNCTIONS
        async function cancelAppointment(appointmentId) {
            if (!confirm('Are you sure you want to cancel this appointment?')) return;

            try {
                await apiCall('updateAppointment', {
                    appointmentId,
                    status: 'cancelled'
                });
                showSuccess('Appointment cancelled');
                loadAllData();
            } catch (error) {
                console.error('Error cancelling appointment:', error);
            }
        }

        async function markCompleted(appointmentId) {
            try {
                await apiCall('updateAppointment', {
                    appointmentId,
                    status: 'completed'
                });
                showSuccess('Appointment marked as completed');
                loadAllData();
            } catch (error) {
                console.error('Error marking appointment:', error);
            }
        }

        async function markNoShow(appointmentId) {
            try {
                await apiCall('updateAppointment', {
                    appointmentId,
                    status: 'noshow'
                });
                showSuccess('Appointment marked as no-show');
                loadAllData();
            } catch (error) {
                console.error('Error marking appointment:', error);
            }
        }

        async function deleteAppointment(appointmentId) {
            if (!confirm('Are you sure you want to delete this appointment? This cannot be undone.')) return;

            try {
                await apiCall('deleteAppointment', { appointmentId });
                showSuccess('Appointment deleted');
                loadAllData();
            } catch (error) {
                console.error('Error deleting appointment:', error);
            }
        }

        async function handleBlockTime() {
            const date = document.getElementById('blockDate').value;
            const startTime = document.getElementById('blockStartTime').value;
            const endTime = document.getElementById('blockEndTime').value;
            const reason = document.getElementById('blockReason').value;

            if (!date || !startTime || !endTime) {
                showError('Please fill in all required fields');
                return;
            }

            try {
                await apiCall('blockTime', {
                    date,
                    startTime,
                    endTime,
                    reason
                });
                showSuccess('Time blocked successfully');
                document.getElementById('blockReason').value = '';
                loadAllData();
            } catch (error) {
                console.error('Error blocking time:', error);
            }
        }

        // MODAL FUNCTIONS
        function openEditModal(appointmentId) {
            const apt = allAppointments.find(a => a.id === appointmentId);
            if (!apt) return;

            currentEditingAppointmentId = appointmentId;
            const content = document.getElementById('editModalContent');
            content.innerHTML = `
                <div class="form-group">
                    <label for="editDate">Date</label>
                    <input type="date" id="editDate" value="${apt.date.split('T')[0]}">
                </div>
                <div class="form-group">
                    <label for="editTime">Time</label>
                    <input type="time" id="editTime" value="${apt.time}">
                </div>
                <div class="form-group">
                    <label for="editService">Service</label>
                    <input type="text" id="editService" value="${apt.service}">
                </div>
                <div class="form-group">
                    <label for="editClientNotes">Client Notes</label>
                    <textarea id="editClientNotes">${apt.clientNotes || ''}</textarea>
                </div>
            `;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            currentEditingAppointmentId = null;
        }

        async function saveEditedAppointment() {
            const date = document.getElementById('editDate').value;
            const time = document.getElementById('editTime').value;
            const service = document.getElementById('editService').value;
            const clientNotes = document.getElementById('editClientNotes').value;

            try {
                await apiCall('updateAppointment', {
                    appointmentId: currentEditingAppointmentId,
                    date,
                    time,
                    service,
                    clientNotes
                });
                showSuccess('Appointment updated');
                closeEditModal();
                loadAllData();
            } catch (error) {
                console.error('Error updating appointment:', error);
            }
        }

        function openNotesModal(appointmentId) {
            const apt = allAppointments.find(a => a.id === appointmentId);
            if (!apt) return;

            currentEditingNotesAppointmentId = appointmentId;
            document.getElementById('adminNotes').value = apt.adminNotes || '';
            document.getElementById('notesModal').classList.add('active');
        }

        function closeNotesModal() {
            document.getElementById('notesModal').classList.remove('active');
            currentEditingNotesAppointmentId = null;
        }

        async function saveAdminNotes() {
            const adminNotes = document.getElementById('adminNotes').value;

            try {
                await apiCall('addAdminNote', {
                    appointmentId: currentEditingNotesAppointmentId,
                    adminNotes
                });
                showSuccess('Notes saved');
                closeNotesModal();
                loadAllData();
            } catch (error) {
                console.error('Error saving notes:', error);
            }
        }

        // UTILITY FUNCTIONS
        function formatDateTime(date, time) {
            return `${formatDate(date)} at ${formatTime(time)}`;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        }

        function formatTime(timeString) {
            const [hours, minutes] = timeString.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const displayHour = hour % 12 || 12;
            return `${displayHour}:${minutes} ${ampm}`;
        }

        function showSuccess(message) {
            const msgEl = document.getElementById('successMessage');
            msgEl.textContent = message;
            msgEl.style.display = 'block';
            setTimeout(() => msgEl.style.display = 'none', 3000);
        }

        function showError(message) {
            const msgEl = document.getElementById('errorMessage');
            msgEl.textContent = message;
            msgEl.style.display = 'block';
            setTimeout(() => msgEl.style.display = 'none', 5000);
        }
    </script>
</body>
</html>
